# GlazeSmith Docker Compose — AMD ROCm GPU Stack
# Backend (CPU): FastAPI + XGBoost + Faiss
# Frontend: Next.js
# SDXL (AMD ROCm GPU): Stable Diffusion XL on AMD Instinct MI300X
# Use `docker compose --profile full up` to enable GPU SDXL service
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - SDXL_SERVICE_URL=http://sdxl:8001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000

  sdxl:
    profiles: ["full"]
    build:
      context: ./sdxl-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - sdxl-models:/root/.cache/huggingface
      - sdxl-images:/app/images
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    deploy:
      resources:
        reservations:
          devices:
            - driver: amd
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  sdxl-models:
  sdxl-images:
